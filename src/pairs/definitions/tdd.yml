name: tdd
mode: tdd
authority: gate

driver:
  role: tdd-driver
  prompt: ~/.agents-os/src/pairs/prompts/tdd-driver.md
  model: fast
  tools: default

advisor:
  role: tdd-discipline-advisor
  prompt: ~/.agents-os/src/pairs/prompts/tdd-advisor.md
  model: smart
  tools: read, grep, find, ls
  max_rechecks_after_rejection: 1
  can_edit_files: false

detector:
  turn_boundary: true
  triggers:
    - every_driver_turn
    - red_phase_claim
    - green_phase_claim
    - refactor_phase_claim
    - test_failure_summary
    - production_code_change
    - test_intent_change

intervention_rules:
  - id: implementation-before-red
    trigger: production_code_change
    decision: block
    min_authority: gate
    required_resolution: Show a failing test written before the production change, or revert/hold production code until red exists.
  - id: invalid-red-test
    trigger: red_phase_claim
    decision: block
    min_authority: gate
    required_resolution: Demonstrate the failing test fails for the intended behavior, not setup, syntax, environment, or unrelated reasons.
  - id: failing-test-wrong-reason
    trigger: test_failure_summary
    decision: block
    min_authority: gate
    required_resolution: Fix the test or environment until the failure proves the intended missing behavior.
  - id: non-minimal-green
    trigger: green_phase_claim
    decision: block
    min_authority: gate
    required_resolution: Reduce the green change to the minimum needed to pass the red test, or justify why broader change is required.
  - id: refactor-breaks-intent
    trigger: refactor_phase_claim
    decision: block
    min_authority: gate
    required_resolution: Re-run the relevant tests and confirm test intent was not weakened or deleted.

output:
  compact_result: true
  include_full_trace: false

artifacts:
  root: .pi/artifacts/pairs
  run_dir: .pi/artifacts/pairs/runs/<run-id>
  index: .pi/artifacts/pairs/index.jsonl

capabilities:
  live_transport:
    - pi-intercom
    - local-socket
  turn_boundary_events: required
  tagged_message_injection: required
  filesystem_polling: forbidden
  gate_runtime_future: true
  advisor_can_edit_files: false
  live_runtime_v1: false
