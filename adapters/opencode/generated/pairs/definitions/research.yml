name: research
mode: research
authority: observe

driver:
  role: research-driver
  prompt: ~/.agents-os/src/pairs/prompts/research-driver.md
  model: smart
  tools: web_search, fetch_content, get_search_content, read

advisor:
  role: claim-citation-advisor
  prompt: ~/.agents-os/src/pairs/prompts/research-advisor.md
  model: smart
  tools: web_search, fetch_content, get_search_content, read
  max_rechecks_after_rejection: 1

detector:
  turn_boundary: true
  triggers:
    - factual_claim
    - citation_sensitive_claim
    - draft_or_final_answer
    - uncertainty_or_conflict

intervention_rules:
  - id: missing-official-citation
    trigger: citation_sensitive_claim
    decision: steer
    min_authority: advise
  - id: unsupported-current-model-claim
    trigger: factual_claim
    decision: steer
    min_authority: advise
  - id: source-conflict-or-uncertainty
    trigger: uncertainty_or_conflict
    decision: note
    min_authority: observe

output:
  compact_result: true
  include_full_trace: false

artifacts:
  root: .pi/artifacts/pairs
  run_dir: .pi/artifacts/pairs/runs/<run-id>
  index: .pi/artifacts/pairs/index.jsonl

capabilities:
  live_transport:
    - pi-intercom
    - local-socket
  turn_boundary_events: required
  tagged_message_injection: required
  filesystem_polling: forbidden
  one_to_many_advisors_future_compatible: true
